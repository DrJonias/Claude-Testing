<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maus-Speedrun — Playground</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a class="back" href="../index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Zurück
  </a>

  <div id="hud">
    <div id="timer">0.000 s</div>
    <div id="best-display"></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <!-- Start -->
  <div id="overlay-start" class="overlay">
    <div class="overlay-box">
      <div class="overlay-icon">🖱️</div>
      <h2>Maus-Speedrun</h2>
      <p>Folge dem Kanal mit der Maus,<br>ohne die <span class="hl-red">Wände</span> zu berühren.</p>
      <p class="hint">Danach: Maus zum <span class="hl-green">START</span> bewegen, um zu beginnen.</p>
      <button id="btn-start">Los geht's!</button>
    </div>
  </div>

  <!-- Death -->
  <div id="overlay-dead" class="overlay hidden">
    <div class="overlay-box dead">
      <div class="overlay-icon">💥</div>
      <h2>Erwischt!</h2>
      <p id="dead-info"></p>
      <button id="btn-retry">Nochmal</button>
    </div>
  </div>

  <!-- Win -->
  <div id="overlay-win" class="overlay hidden">
    <div class="overlay-box win">
      <div class="overlay-icon">🏁</div>
      <h2>Ziel erreicht!</h2>
      <p id="win-time-info"></p>
      <p id="win-record-info"></p>
      <button id="btn-again">Nochmal</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
